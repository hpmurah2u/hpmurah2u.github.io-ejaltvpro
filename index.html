* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
body { background: #0a0b10; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 10px; }
.iptv-gempak { max-width: 1600px; width: 100%; background: #0c0e14; border-radius: 36px 36px 28px 28px; box-shadow: 0 30px 60px rgba(0,0,0,0.8), 0 0 0 2px #353a50 inset; overflow: hidden; border: 1px solid rgba(212,175,55,0.2); }

/* navbar */
.navbar { background: linear-gradient(160deg, #1a1f2f 0%, #0f1422 100%); padding: 16px 28px; display: flex; align-items: center; justify-content: space-between; border-bottom: 4px solid #d4af37; flex-wrap: wrap; gap: 15px; }
.logo-area { display: flex; align-items: center; gap: 25px; }
.logo { font-size: 2.2rem; font-weight: 800; background: linear-gradient(135deg, #fff6d5, #d4af37); -webkit-background-clip: text; background-clip: text; color: transparent; }
.search-bar { background: #262b3d; border-radius: 40px; padding: 8px 20px; display: flex; align-items: center; width: 280px; border: 1px solid #555e80; }
.search-bar i { color: #d4af37; margin-right: 10px; }
.search-bar input { background: transparent; border: none; outline: none; width: 100%; color: #f0f0f0; }
.user-profile { display: flex; align-items: center; gap: 22px; color: #ddd; }
.avatar { background: #2e3653; border-radius: 50px; padding: 6px 16px 6px 12px; display: flex; align-items: center; gap: 10px; border: 1px solid #d4af37; }

/* main grid - 3 column */
.main-dashboard { display: grid; grid-template-columns: 1.2fr 0.8fr 0.8fr; gap: 2px; background: #0a0b12; padding: 3px; }

/* player section */
.player-section { background: #000; border-radius: 24px 0 0 0; overflow: hidden; display: flex; flex-direction: column; position: relative; }
.video-js { width: 100%; aspect-ratio: 16 / 9; background: #0a0c16; }

/* watermark kecil */
.watermark-ejaltv { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); z-index: 50; pointer-events: none; background: rgba(20,25,35,0.25); backdrop-filter: blur(2px); padding: 3px 12px; border-radius: 40px; border: 1px solid rgba(212,175,55,0.2); font-size: 0.75rem; color: rgba(255,255,255,0.5); display: flex; align-items: center; gap: 4px; }
.watermark-ejaltv i { color: rgba(212,175,55,0.6); font-size: 0.65rem; }

/* channel info bar */
.channel-info-bar { background: #151a26; padding: 18px 20px; display: flex; align-items: center; gap: 20px; border-top: 3px solid #3d435d; }
.channel-logo-big { width: 70px; height: 70px; border-radius: 20px; display: flex; align-items: center; justify-content: center; overflow: hidden; background: #252e44; border: 2px solid #d4af37; }
.channel-logo-big img { width: 100%; height: 100%; object-fit: contain; }
.channel-meta-big h2 { color: white; font-size: 2rem; }
.channel-meta-big p { color: #b7c3ec; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.live-badge { background: #d62f2f; color: white; padding: 4px 16px; border-radius: 40px; font-weight: 700; font-size: 0.8rem; display: inline-flex; align-items: center; gap: 6px; }

/* subtitle button */
.subtitle-btn { background: #2a3150; color: #d4af37; border: 1px solid #d4af37; border-radius: 20px; padding: 4px 12px; font-size: 0.8rem; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; margin-left: 10px; }
.subtitle-btn:hover { background: #3a4568; }

/* sidebar kategori */
.category-channel-sidebar { background: #121624; padding: 16px 12px; border-left: 3px solid #3b425c; display: flex; flex-direction: column; max-height: 800px; }
.category-tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 18px; border-bottom: 2px solid #262e44; padding-bottom: 12px; }
.cat-btn { background: #1f263b; border: none; color: #b1bde2; padding: 8px 14px; border-radius: 40px; font-weight: 600; font-size: 0.8rem; cursor: pointer; border: 1px solid transparent; white-space: nowrap; }
.cat-btn i { margin-right: 5px; color: #d4af37; }
.cat-btn.active { background: #2f3857; color: white; border-color: #d4af37; }

/* channel list */
.channel-list-container { flex: 1; overflow-y: auto; padding-right: 6px; scrollbar-width: thin; scrollbar-color: #d4af37 #1b2133; max-height: 650px; }
.channel-list-container::-webkit-scrollbar { width: 5px; }
.channel-list-container::-webkit-scrollbar-track { background: #1b2133; }
.channel-list-container::-webkit-scrollbar-thumb { background: #d4af37; border-radius: 20px; }

.channel-item { display: flex; align-items: center; background: #1a1f31; margin-bottom: 8px; border-radius: 16px; padding: 8px 12px; border: 1px solid #333c58; cursor: pointer; transition: 0.15s; }
.channel-item.active-channel { background: #262f4b; border-left: 6px solid #d4af37; }
.channel-logo-small { width: 34px; height: 34px; border-radius: 10px; margin-right: 12px; overflow: hidden; background: #242c44; border: 1px solid #d4af3760; }
.channel-logo-small img { width: 100%; height: 100%; object-fit: contain; }
.ch-info { flex: 1; }
.ch-name { color: white; font-weight: 600; font-size: 0.95rem; display: flex; align-items: center; gap: 5px; }
.ch-program { font-size: 0.7rem; color: #a7b3dd; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 150px; }
.live-mini { background: #c92f2f; color: white; border-radius: 12px; padding: 2px 8px; font-size: 0.6rem; font-weight: 700; margin-left: 6px; }
.format-tag { background: #2b3655; color: #b5c7ff; font-size: 0.6rem; padding: 2px 6px; border-radius: 12px; margin-left: 6px; }

.epg-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; color: #d4af37; }
.epg-header h3 { font-size: 1.1rem; }
.epg-date { background: #1f263b; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; color: #b7c3ec; }

.epg-program-list { flex: 1; overflow-y: auto; padding-right: 6px; scrollbar-width: thin; scrollbar-color: #d4af37 #1b2133; }
.epg-program-list::-webkit-scrollbar { width: 5px; }
.epg-program-list::-webkit-scrollbar-track { background: #1b2133; }
.epg-program-list::-webkit-scrollbar-thumb { background: #d4af37; border-radius: 20px; }

.epg-program-item { background: #1a1f31; margin-bottom: 8px; border-radius: 12px; padding: 10px; border-left: 3px solid transparent; }
.epg-program-item.now { border-left-color: #d4af37; background: #262f4b; }

.epg-program-item .title { color: white; font-size: 0.9rem; font-weight: 500; margin: 4px 0; }
.epg-program-item .desc { color: #a7b3dd; font-size: 0.7rem; display: flex; justify-content: space-between; }
.epg-program-item .badge { background: #d4af3720; color: #d4af37; padding: 2px 8px; border-radius: 12px; font-size: 0.6rem; }

.epg-bar { background: #111520; padding: 14px 28px; display: flex; align-items: center; justify-content: space-between; border-top: 2px solid #2d344b; color: #b9c4ec; font-size: 0.9rem; flex-wrap: wrap; }

.epg-select { background: #1f253b; color: white; border: 1px solid #d4af37; border-radius: 20px; padding: 5px 15px; font-size: 0.8rem; cursor: pointer; }

/* responsive */
@media (max-width: 1200px) {

// Data EPG simulasi (akan digantikan dengan data dari URL sebenar)
function generateEPGData(channelTvid) {
const now = new Date();
const currentHour = now.getHours();
const programs = [];

// Generate 5 program sebelum dan 5 program selepas
for (let i = -3; i <= 3; i++) {
const startHour = currentHour + i;
if (startHour < 0 || startHour >= 24) continue;

const startTime = `${startHour}:00`.padStart(5, '0');
const endTime = `${startHour + 1}:00`.padStart(5, '0');

let title = "";
let isNow = (i === 0);

if (channelTvid.includes("hbo")) {
const movies = ["Venom 2", "Godzilla vs Kong", "Dune", "Free Guy", "Spider-Man", "Top Gun", "John Wick", "Casablanca"];
title = movies[Math.abs(startHour) % movies.length];
} else if (channelTvid.includes("sports") || channelTvid.includes("arena")) {
const sports = ["Bola Sepak Live", "Tennis ATP", "MotoGP", "Badminton", "Liga Perancis", "NFL", "Atlétik", "PGA Tour", "Raw", "F1 GP"];
title = sports[Math.abs(startHour) % sports.length];
} else if (channelTvid.includes("news")) {
const news = ["Buletin Utama", "World News", "Business Report", "Today's Talk", "Global Update", "Market Watch", "Press Conference", "Documentary"];
title = news[Math.abs(startHour) % news.length];
} else {
const generic = ["Rancangan Pagi", "Slot Tengahari", "Drama Petang", "Berita", "Hiburan Malam", "Movie Night", "Konsert", "Tazkirah"];
title = generic[Math.abs(startHour) % generic.length];
}

programs.push({
start: startTime,
end: endTime,
title: title,
description: `${title} - Rancangan pilihan`,
isNow: isNow
});
}

return programs;
}

// Fungsi untuk render channel berdasarkan kategori
function renderChannels(category) {
const container = document.getElementById('channelListContainer');
const filtered = channels.filter(ch => ch.category === category);

if (filtered.length === 0) {
container.innerHTML = '<div style="color: #b7c3ec; padding: 20px; text-align: center;">Tiada channel dalam kategori ini</div>';
return;
}

let html = `<div class="category-title"><i class="fas fa-tv"></i> ${category.toUpperCase()} · ${filtered.length} channel</div>`;

filtered.forEach((ch) => {
const activeClass = (ch.name === currentChannel.name) ? 'active-channel' : '';
const liveTag = ch.live ? '<span class="live-mini">LIVE</span>' : '';
const logoUrl = ch.logo || 'https://via.placeholder.com/34x34/242c44/d4af37?text=TV';

html += `
<div class="channel-item ${activeClass}" data-name="${ch.name}">
<div class="channel-logo-small"><img src="${logoUrl}" alt="${ch.name}" onerror="this.src='https://via.placeholder.com/34x34/242c44/d4af37?text=TV'"></div>
<div class="ch-info">
<div class="ch-name">${ch.name} ${liveTag}</div>
<div class="ch-program">${ch.prog} <span class="format-tag">${ch.format}</span></div>
</div>
</div>
`;
});

container.innerHTML = html;

// Add click event untuk setiap channel
document.querySelectorAll('.channel-item').forEach(item => {
item.addEventListener('click', function() {
const name = this.dataset.name;
const channel = channels.find(c => c.name === name);
if (channel) switchChannel(channel);
});
});
}

// Fungsi untuk render EPG guide
function renderEPGGuide(channel) {
document.getElementById('epgChannelName').innerText = channel.name;

const now = new Date();
const dateStr = now.toLocaleDateString('ms-MY', { day: 'numeric', month: 'long', year: 'numeric' });
document.getElementById('epgDate').innerText = dateStr;

const programs = generateEPGData(channel.tvid);

const container = document.getElementById('epgProgramList');
let html = '';

programs.sort((a, b) => {
const aHour = parseInt(a.start.split(':')[0]);
const bHour = parseInt(b.start.split(':')[0]);
return aHour - bHour;
});

programs.forEach(prog => {
const nowClass = prog.isNow ? 'now' : '';
const badge = prog.isNow ? '<span class="badge">SEKARANG</span>' : '';

html += `
<div class="epg-program-item ${nowClass}">
<div class="time">${prog.start} - ${prog.end}</div>
<div class="title">${prog.title}</div>
<div class="desc">${prog.description} ${badge}</div>
</div>
`;
});

container.innerHTML = html;
}

// Fungsi tukar channel
function switchChannel(channel) {
currentChannel = channel;

// Update active class
document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('active-channel'));
const activeItem = document.querySelector(`.channel-item[data-name="${channel.name}"]`);
if (activeItem) activeItem.classList.add('active-channel');

// Update info bar
const logoBig = document.getElementById('currentChannelLogo');
logoBig.innerHTML = `<img src="${channel.logo}" alt="${channel.name}" onerror="this.src='https://via.placeholder.com/70x70/252e44/d4af37?text=TV'">`;

document.getElementById('currentChannelName').innerHTML = `${channel.name} <span class="live-badge"><i class="fas fa-circle"></i> ${channel.live ? 'LIVE' : 'ON AIR'}</span>`;

document.getElementById('currentChannelProg').innerHTML = `
<i class="fas fa-tv"></i> ${channel.prog} · <span class="format-tag">${channel.format}</span>
<span class="subtitle-btn" id="subtitleBtn"><i class="fas fa-closed-captioning"></i> Subtitle</span>
`;

// Play channel
let source = {
src: channel.url,
type: channel.format === 'mpd' ? 'application/dash+xml' : 'application/x-mpegURL'
};

player.src(source);
player.play();

// Setup subtitle button
setupSubtitleButton(channel);

// Render EPG guide untuk channel ini
renderEPGGuide(channel);
}

// Fungsi untuk subtitle button
function setupSubtitleButton(channel) {
const btn = document.getElementById('subtitleBtn');
if (!btn) return;

// Remove old event listeners with clone
const newBtn = btn.cloneNode(true);
btn.parentNode.replaceChild(newBtn, btn);
newBtn.id = 'subtitleBtn';

if (channel.subtitles && channel.subtitles.length > 0) {
newBtn.style.display = 'inline-flex';
newBtn.addEventListener('click', () => {
let menu = 'Pilih subtitle:\n';
channel.subtitles.forEach((sub, i) => {
menu += `${i+1}. ${sub.label}\n`;
});
menu += `${channel.subtitles.length+1}. Matikan subtitle`;

const choice = prompt(menu, '1');
if (choice) {
const idx = parseInt(choice) - 1;
if (idx >= 0 && idx < channel.subtitles.length) {
// Clear existing tracks
const tracks = player.textTracks();
for (let i = 0; i < tracks.length; i++) {
player.removeRemoteTextTrack(tracks[i]);
}

// Add new track
const track = player.addRemoteTextTrack({
kind: 'subtitles',
label: channel.subtitles[idx].label,
src: channel.subtitles[idx].src,
srclang: 'ms',
default: true
}, true);

// Enable the track
setTimeout(() => {
const textTracks = player.textTracks();
for (let i = 0; i < textTracks.length; i++) {
if (textTracks[i].label === channel.subtitles[idx].label) {
textTracks[i].mode = 'showing';
}
}
}, 500);

alert(`Subtitle ${channel.subtitles[idx].label} diaktifkan`);
} else if (idx === channel.subtitles.length) {
// Disable all subtitles
const tracks = player.textTracks();
for (let i = 0; i < tracks.length; i++) {
player.removeRemoteTextTrack(tracks[i]);
}
alert('Subtitle dimatikan');
}
}
});
} else {
newBtn.style.display = 'none';
}
}

// Update current time
function updateTime() {
const now = new Date();
let hours = now.getHours();
const minutes = now.getMinutes();
const ampm = hours >= 12 ? 'PM' : 'AM';
hours = hours % 12 || 12;
document.getElementById('currentTime').innerText = `${hours}:${minutes < 10 ? '0' + minutes : minutes} ${ampm}`;
}
setInterval(updateTime, 1000);
updateTime();

// EPG source selector
document.getElementById('epgSourceSelect').addEventListener('change', function(e) {
console.log('EPG source changed to:', e.target.value);
alert('Sumber EPG ditukar kepada: ' + e.target.value + '\n\nNota: Integrasi EPG sebenar memerlukan parsing XML. Untuk demo, data simulasi digunakan.');
});

// Initialize
renderCategoryTabs();
renderChannels('malaysia');

// Set default channel to HBO (which is in movies category)
setTimeout(() => {
const hboChannel = channels.find(ch => ch.name === "HBO");
if (hboChannel) {
// Switch to movies category first
currentCategory = 'movies';
document.querySelectorAll('.cat-btn').forEach(b => {
b.classList.remove('active');
if (b.dataset.cat === 'movies') b.classList.add('active');
});
renderChannels('movies');
setTimeout(() => switchChannel(hboChannel), 100);
}
}, 500);
})();
