<style>
* {
margin: 0;
padding: 0;
box-sizing: border-box;
transition: background-color 0.3s, color 0.2s;
}

:root {
--bg-primary: #0a0a0a;
--bg-secondary: #141414;
--bg-tertiary: #1e1e1e;
--text-primary: #ffffff;
--text-secondary: #b3b3b3;
--accent: #e50914;
--accent-hover: #f40612;
--gold: #ffd700;
--border: #2a2a2a;
}

.light-mode {
--bg-primary: #f5f5f5;
--bg-secondary: #ffffff;
--bg-tertiary: #e8e8e8;
--text-primary: #141414;
--text-secondary: #4a4a4a;
--accent: #e50914;
--border: #d0d0d0;
}

body {
font-family: 'Segoe UI', Arial, sans-serif;
background: var(--bg-primary);
color: var(--text-primary);
overflow: hidden;
}

#layout {
display: flex;
height: 100vh;
position: relative;
}

/* SIDEBAR KATEGORI */
#categories {
width: 200px;
background: var(--bg-secondary);
border-right: 1px solid var(--border);
overflow-y: auto;
z-index: 10;
}

#catWatermark {
font-family: 'Orbitron', sans-serif;
font-size: 20px;
font-weight: 900;
padding: 20px 0;
text-align: center;
color: var(--accent);
letter-spacing: 3px;
border-bottom: 1px solid var(--border);
background: var(--bg-secondary);
position: sticky;
top: 0;
z-index: 2;
text-shadow: 0 0 10px rgba(229,9,20,0.5);
}

.cat {
padding: 15px 12px;
cursor: pointer;
color: var(--text-secondary);
border-bottom: 1px solid var(--border);
display: flex;
align-items: center;
gap: 12px;
font-size: 15px;
transition: all 0.2s;
}

.cat i {
width: 24px;
font-size: 18px;
color: var(--accent);
}

.cat:hover, .cat.active {
background: var(--accent);
color: white;

}

.cat:hover i, .cat.active i {

}

/* PANEL CHANNEL */
#channelPanel {
width: 320px;
background: var(--bg-secondary);
border-right: 1px solid var(--border);
display: flex;
flex-direction: column;
}

#search {
padding: 15px;
border: none;
background: var(--bg-tertiary);
color: var(--text-primary);
font-size: 15px;
border-bottom: 1px solid var(--border);

}

#search::placeholder {
color: var(--text-secondary);
}

#channels {
flex: 1;
overflow-y: auto;
scrollbar-width: thin;
scrollbar-color: var(--accent) var(--border);
}

#channels::-webkit-scrollbar {
width: 6px;
}

#channels::-webkit-scrollbar-track {
background: var(--border);
}

#channels::-webkit-scrollbar-thumb {
background: var(--accent);

}

.channel {
display: flex;
align-items: center;
gap: 12px;
padding: 12px;
cursor: pointer;
border-bottom: 1px solid var(--border);
transition: all 0.2s;
}

.channel:hover {
background: var(--bg-tertiary);
}

.channel img {
width: 40px;
height: 40px;
border-radius: 8px;
object-fit: cover;

}

.channel .name {
flex: 1;

.fav-icon:hover {

height: 100%;

height: 100%;

#watermark {

left: 50%;

<script>
// ==================== INIT SHAKA PLAYER ====================
let player = null;
let videoElement = null;

// Helper untuk show error
function showError(message) {
let errorDiv = document.getElementById('errorMessage');
errorDiv.innerHTML = message;
errorDiv.classList.add('show');
setTimeout(() => {
errorDiv.classList.remove('show');
}, 5000);
}

// Helper untuk convert hex string to Uint8Array
function hexToUint8Array(hex) {
// Remove any non-hex characters
hex = hex.replace(/[^0-9A-Fa-f]/g, '');
if (hex.length % 2 !== 0) {
hex = '0' + hex;
}
const view = new Uint8Array(hex.length / 2);
for (let i = 0; i < hex.length; i += 2) {
view[i / 2] = parseInt(hex.substr(i, 2), 16);
}
return view;
}

// Helper untuk format key ID untuk ClearKey
function formatKeyIdForClearKey(keyId) {
// Shaka Player expects key ID in the format of a UUID with hyphens
// But we can also use raw hex
try {
// If it's already in UUID format, return as is
if (keyId.includes('-')) {
return keyId.toLowerCase();
}
// If it's a hex string, try to format as UUID
if (keyId.length === 32) {
return keyId.toLowerCase();
}
return keyId;
} catch (e) {
return keyId;
}
}

// Inisialisasi Shaka Player
async function initShakaPlayer() {
videoElement = document.getElementById('videoElement');
player = new shaka.Player(videoElement);

// Konfigurasi Shaka
player.configure({
preferredAudioLanguage: 'ms',
preferredTextLanguage: 'ms',
drm: {
servers: {
'org.w3.clearkey': 'https://cwip-shaka-proxy.appspot.com/no_auth',
'com.widevine.alpha': 'https://widevine-proxy.appspot.com/proxy'
},
advanced: {
'org.w3.clearkey': {
distinctiveIdentifierRequired: false,
persistentStateRequired: false,
videoRobustness: '',
audioRobustness: ''
}
}
},
manifest: {
dash: {
clockSyncUri: 'https://time.google.com/time.txt',
ignoreDrmInfo: false,
disableText: false,
disableAudio: false
}
},
streaming: {
bufferingGoal: 30,
rebufferingGoal: 15,
bufferBehind: 60,
ignoreTextStreamFailures: true,
ignoreAudioStreamFailures: true,
retryParameters: {
maxAttempts: 5,
baseDelay: 1000,
backoffFactor: 2,
fatalAttempts: 5,
timeout: 30000
}
}
});

// Event listeners
player.addEventListener('error', (e) => {
console.error('Shaka Player error:', e.detail);
let error = e.detail;
let message = 'Ralat memainkan saluran: ';

if (error.category === shaka.util.Error.Category.DRM) {
message += 'DRM Error - Mungkin key tidak sah';
} else if (error.category === shaka.util.Error.Category.NETWORK) {
message += 'Network Error - Cuba refresh';
} else {
message += error.message || 'Unknown error';
}

showError(message);
document.getElementById('epgBar').innerHTML = ' ' + message;
});

// Network request filter untuk handle CORS
player.getNetworkingEngine().registerRequestFilter((type, request) => {
// Add headers to avoid CORS issues
request.headers = request.headers || {};
request.headers['Origin'] = window.location.origin;
request.headers['Referer'] = window.location.href;
request.allowCrossSiteRedirects = true;
});

console.log('Shaka Player initialized');
}

// Fungsi untuk main channel dengan ClearKey
async function playWithShaka(url, kid, key) {
try {
if (!player) {
await initShakaPlayer();
}

// Reset configuration to default
let config = {
drm: {
clearKeys: {}
}
};

// If ClearKey is provided
if (kid && key && kid !== '' && key !== '') {
try {
// Convert hex to Uint8Array
const keyId = hexToUint8Array(kid);
const keyValue = hexToUint8Array(key);
config.drm.clearKeys[keyId] = keyValue;
console.log('ClearKey configured:', {kid, key});
} catch (e) {
console.warn('Error converting keys:', e);
}
}

// Apply configuration
player.configure(config);

// Try to load the stream
console.log('Loading stream:', url);
await player.load(url);
console.log('Stream loaded successfully');

// Autoplay
videoElement.play();

} catch (error) {
console.error('Error loading stream:', error);
let message = 'Ralat memuatkan stream: ';

if (error.code === 7000) {
message += 'DRM Error - Key tidak sah atau stream dilindungi';
} else if (error.code === 1001) {
message += 'Network Error - URL tidak reachable';
} else if (error.code === 1002) {
message += 'HTTP Error - Server mungkin down';
} else if (error.code === 6001) {
message += 'Manifest Error - Format tidak support';
} else if (error.code === 6014) {
message += 'CORS Error - Server block request';
} else {
message += error.message || 'Unknown error';
}

showError(message);
document.getElementById('epgBar').innerHTML = ' ' + message;

// Try fallback to HLS.js for m3u8 if available
if (url.includes('.m3u8') && typeof Hls !== 'undefined') {
tryFallbackToHLS(url);
}
}
}

// Fallback ke HLS untuk .m3u8 streams
function tryFallbackToHLS(url) {
if (Hls.isSupported()) {
showError('Mencuba HLS fallback...');
let hls = new Hls();
hls.loadSource(url);
hls.attachMedia(videoElement);
hls.on(Hls.Events.MANIFEST_PARSED, function() {
videoElement.play();
});
}
}

let safeLogo = c.logo.replace(/'/g, "\\'");
html += `<div class="channel" onclick="playChannel('${safeUrl}','${c.kid || ''}','${c.key || ''}','${c.epgId}','${safeName}','${safeLogo}')">
<img src="${c.logo}" onerror="this.src='https://via.placeholder.com/40?text=TV'">
<span class="name">${c.name}</span>
<span class="fav-icon" onclick="toggleFav('${safeName}'); event.stopPropagation();">${favIcon}</span>
</div>`;
});
document.getElementById("channels").innerHTML = html || "<div style='color:#777;padding:20px;text-align:center'>Tiada saluran</div>";
}

function showCat(cat) {
if (channelData[cat]) {
currentList = channelData[cat];
} else {
currentList = [];
}
renderChannels(currentList);
}

function showFavorites() {
currentList = [];
Object.keys(channelData).forEach(cat => {
if (Array.isArray(channelData[cat])) {
currentList = currentList.concat(channelData[cat]);
}
});
currentList = currentList.filter(c => favorites.includes(c.name));
renderChannels(currentList);
}

function toggleFav(name) {
if (favorites.includes(name)) {
favorites = favorites.filter(f => f !== name);
} else {
favorites.push(name);
}
localStorage.setItem("ejalFav", JSON.stringify(favorites));
renderChannels(currentList);
}

function searchChannel() {
let q = document.getElementById("search").value.toLowerCase();
renderChannels(currentList.filter(c => c.name.toLowerCase().includes(q)));
}

// ==================== FUNGSI PLAY CHANNEL ====================
function playChannel(url, kid, key, epgId, name, logo) {
// Simpan ke recent
addToRecent({name, logo, url, kid, key, epgId});

// Set current channel
currentChannel = {name, logo, url, kid, key, epgId};

// Update EPG
document.getElementById('epgBar').innerHTML = ' Memuatkan ' + name + '...';

// Play using Shaka Player
playWithShaka(url, kid, key);

// Load EPG
loadEPG(epgId);

// Trigger auto play if enabled
if (autoPlayEnabled) {
scheduleAutoPlay();
}

// Update auto play indicator
updateAutoPlayIndicator();
}

// ==================== RECENT CHANNELS ====================
function addToRecent(channel) {
// Remove if exists
recentChannels = recentChannels.filter(c => c.name !== channel.name);
// Add to front
recentChannels.unshift(channel);
// Keep only last 8
if (recentChannels.length > 8) recentChannels.pop();

localStorage.setItem("recentChannels", JSON.stringify(recentChannels));
renderRecent();
}

function renderRecent() {
let html = "";
recentChannels.slice(0, 6).forEach(c => {
let safeUrl = c.url.replace(/'/g, "\\'");
let safeName = c.name.replace(/'/g, "\\'");
let safeLogo = c.logo.replace(/'/g, "\\'");
html += `<div class="recent-item" onclick="playChannel('${safeUrl}','${c.kid || ''}','${c.key || ''}','${c.epgId}','${safeName}','${safeLogo}')">
<img src="${c.logo}" onerror="this.src='https://via.placeholder.com/24?text=' + encodeURIComponent('${c.name}'); this.onerror=null;" style="object-fit: contain; background: #333;">
<span>${c.name}</span>
</div>`;
});
document.getElementById("recentChannels").innerHTML = html || "<div style='color:#777;padding:8px;text-align:center'>Tiada recent</div>";
}

// ==================== TOGGLE RECENT PANEL ====================
function toggleRecentPanel() {
let content = document.getElementById("recentContent");
let icon = document.getElementById("recentToggleIcon");

content.classList.toggle("collapsed");

if (content.classList.contains("collapsed")) {
icon.className = "fas fa-chevron-down";
} else {
icon.className = "fas fa-chevron-up";
}
}

// Auto fade recent panel
let recentTimer;
function resetRecentFade() {
let panel = document.getElementById("recentPanel");
panel.style.opacity = "1";

if (recentTimer) clearTimeout(recentTimer);
recentTimer = setTimeout(() => {
if (!panel.matches(':hover')) {
panel.style.opacity = "0.5";
}
}, 3000);
}

// Event listeners untuk recent panel fade
document.getElementById("recentPanel").addEventListener("mouseenter", function() {
this.style.opacity = "1";
if (recentTimer) clearTimeout(recentTimer);
});

document.getElementById("recentPanel").addEventListener("mouseleave", function() {
resetRecentFade();
});

// ==================== AUTO PLAY NEXT ====================
function toggleAutoPlay() {
autoPlayEnabled = !autoPlayEnabled;
let btn = document.getElementById("autoPlayBtn");
if (autoPlayEnabled) {
btn.classList.add("active");
btn.style.background = "var(--gold)";
scheduleAutoPlay();
} else {
btn.classList.remove("active");
btn.style.background = "";
if (autoPlayTimer) {
clearTimeout(autoPlayTimer);
autoPlayTimer = null;
}
document.getElementById("autoPlayIndicator").classList.remove("show");
}
}

function scheduleAutoPlay() {
if (autoPlayTimer) clearTimeout(autoPlayTimer);

// Auto play selepas 30 saat
autoPlayTimer = setTimeout(() => {
playNextRandomChannel();
}, 30000);

// Update indicator
updateAutoPlayIndicator();
}

function playNextRandomChannel() {
// Pilih random channel dari currentList
if (currentList.length > 0) {
let randomIndex = Math.floor(Math.random() * currentList.length);
let nextChannel = currentList[randomIndex];
playChannel(
nextChannel.url,
nextChannel.kid || '',
nextChannel.key || '',
nextChannel.epgId,
nextChannel.name,
nextChannel.logo
);
}
}

function updateAutoPlayIndicator() {
let indicator = document.getElementById("autoPlayIndicator");
if (autoPlayEnabled && currentList.length > 0) {
let nextName = "Saluran rawak";
indicator.classList.add("show");
document.getElementById("nextChannelName").innerText = nextName;
} else {
indicator.classList.remove("show");
}
}

// ==================== PICTURE-IN-PICTURE ====================
function togglePIP() {
if (document.pictureInPictureEnabled) {
let video = document.querySelector('video');
if (video) {
if (document.pictureInPictureElement) {
document.exitPictureInPicture();
} else {
video.requestPictureInPicture();
}
} else {
alert("Tiada video untuk PIP mode");
}
} else {
alert("Browser tak support PIP");
}
}

// ==================== AUDIO TRACK ====================
function showAudioMenu() {
let menu = document.getElementById("audioMenu");
menu.classList.toggle("show");
}

function switchAudio(lang) {
try {
if (player) {
let tracks = player.getVariantTracks();
if (tracks && tracks.length > 0) {
let audioTracks = tracks.filter(t => t.type === 'variant' && t.language && t.language.includes(lang));
if (audioTracks.length > 0) {
player.selectVariantTrack(audioTracks[0], true);
alert(`Audio ditukar ke ${lang}`);
} else {
alert(`Tiada track audio ${lang}`);
}
}
}
document.getElementById("audioMenu").classList.remove("show");
} catch (e) {
console.error('Error switching audio:', e);
alert('Tidak dapat tukar audio');
}
}

// ==================== SUBTITLE (CC) ====================
function toggleSubtitles() {
try {
if (player) {
let tracks = player.getTextTracks();
if (tracks && tracks.length > 0) {
let enabled = tracks.some(t => t.enabled);
if (enabled) {
tracks.forEach(t => t.enabled = false);
alert('Subtitles dimatikan');
} else {
player.selectTextTrack(tracks[0]);
alert('Subtitles dihidupkan');
}
} else {
alert("Tiada track subtitle");
}
}
} catch (e) {
console.error('Error toggling subtitles:', e);
alert('Subtitle tidak tersedia');
}
}

// ==================== THEME TOGGLE ====================
function toggleTheme() {
document.body.classList.toggle("light-mode");
let icon = document.querySelector("#themeToggle i");
if (document.body.classList.contains("light-mode")) {
icon.className = "fas fa-sun";
} else {
icon.className = "fas fa-moon";
}
}

// ==================== EPG LOADER ====================
async function loadEPG(epgId) {
if (!epgId) {
document.getElementById("epgBar").innerHTML = " Tiada ID EPG untuk saluran ini";
return;
}

let epgBar = document.getElementById("epgBar");
epgBar.innerHTML = " Memuat EPG...";
try {
let html = "";
let now = new Date();
for (let url of epgUrls) {
try {
let res = await fetch(url);
if (!res.ok) continue;
let text = await res.text();
let parser = new DOMParser();
let xmlDoc = parser.parseFromString(text, "application/xml");
let programmes = xmlDoc.querySelectorAll(`programme[channel='${epgId}']`);

programmes.forEach(p => {
let startStr = p.getAttribute('start');
let endStr = p.getAttribute('stop');
if (!startStr || !endStr) return;

startStr = startStr.substr(0, 12);
endStr = endStr.substr(0, 12);

let start = new Date(`${startStr.slice(0,4)}-${startStr.slice(4,6)}-${startStr.slice(6,8)}T${startStr.slice(8,10)}:${startStr.slice(10,12)}:00`);
let end = new Date(`${endStr.slice(0,4)}-${endStr.slice(4,6)}-${endStr.slice(6,8)}T${endStr.slice(8,10)}:${endStr.slice(10,12)}:00`);
let title = p.querySelector('title')?.textContent || 'Tiada Tajuk';
let timeStr = `${start.getHours().toString().padStart(2,'0')}:${start.getMinutes().toString().padStart(2,'0')} - ${end.getHours().toString().padStart(2,'0')}:${end.getMinutes().toString().padStart(2,'0')}`;
let cls = (now >= start && now < end) ? 'epgItem epgCurrent' : 'epgItem';
html += `<span class="${cls}">${timeStr} ${title}</span>`;
});
} catch (e) {
console.warn('Error loading EPG from', url, e);
}
}
epgBar.innerHTML = html || " Tiada data EPG untuk saluran ini";
let current = epgBar.querySelector(".epgCurrent");
if (current) {
epgBar.scrollTop = current.offsetTop - epgBar.offsetHeight/2 + current.offsetHeight/2;
}
} catch (e) {
epgBar.innerHTML = " Ralat EPG";
console.error(e);
}
}

// ==================== REMOTE CONTROL (KEYBOARD) ====================
document.addEventListener('keydown', function(e) {
// Arrow Up/Down: Navigate channels
if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
e.preventDefault();
let channels = document.querySelectorAll('.channel');
let currentFocus = document.activeElement;

if (channels.length > 0) {
if (e.key === 'ArrowDown') {
if (document.activeElement === document.body) {
channels[0].focus();
} else {
let next = Array.from(channels).indexOf(currentFocus) + 1;
if (next < channels.length) channels[next].focus();
}
} else {
if (document.activeElement === document.body) {
channels[channels.length-1].focus();
} else {
let prev = Array.from(channels).indexOf(currentFocus) - 1;
if (prev >= 0) channels[prev].focus();
}
}
}
}

// Arrow Left/Right: Volume
if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
e.preventDefault();
if (videoElement) {
let vol = videoElement.volume;
if (e.key === 'ArrowLeft') {
videoElement.volume = Math.max(0, vol - 0.05);
} else {
videoElement.volume = Math.min(1, vol + 0.05);
}
}
}

// Enter: Play selected channel
if (e.key === 'Enter' && document.activeElement && document.activeElement.classList.contains('channel')) {
document.activeElement.click();
}

// Space: Play/Pause
if (e.key === ' ') {
e.preventDefault();
if (videoElement) {
if (videoElement.paused) {
videoElement.play();
} else {
videoElement.pause();
}
}
}

// C key: Toggle CC
if (e.key === 'c' || e.key === 'C') {
toggleSubtitles();
}

// A key: Toggle AutoPlay
if (e.key === 'a' || e.key === 'A') {
toggleAutoPlay();
}

// P key: PIP
if (e.key === 'p' || e.key === 'P') {
togglePIP();
}
});

initShakaPlayer().catch(console.error);

};

if (!e.target.closest('#audioMenu') && !e.target.closest('[onclick="showAudioMenu()"]')) {
document.getElementById('audioMenu').classList.remove('show');
}
});

// Reset fade bila gerak mouse
document.addEventListener('mousemove', function() {
resetRecentFade();
});

console.log("EJALTV Pro Ultimate with Shaka Player - Ready!");
